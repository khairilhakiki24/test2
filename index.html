<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KasirSync</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#2563EB" id="meta-theme-color">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    
    <style>
        :root {
            --color-primary: #2563EB; /* Premium Blue-600 */
        }
        
        /* Typography & Base */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        
        /* Animasi & Interaksi */
        .btn-press { transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s; cursor: pointer; }
        .btn-press:active { transform: scale(0.95); }
        @keyframes fadeSlideUp { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeSlideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* Glassmorphism Nav */
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.05); }
        .dark .glass-nav { background: rgba(11, 17, 32, 0.85); border-top: 1px solid rgba(255,255,255,0.05); }
        
        /* Safe Area Padding untuk mencegah UI tertutup di Mobile */
        .pb-safe { padding-bottom: calc(85px + env(safe-area-inset-bottom, 20px)); }
        
        /* Hide number input spinners */
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Mobile Cart Drag Area - Prevent native scrolling when swiping */
        #cart-drag-handle { touch-action: pan-x; }
        
        /* Print Styles - Thermal Receipt Format (58mm/80mm) */
        @media print {
            @page { margin: 0; }
            body { background: white !important; color: black !important; margin: 0; padding: 0; display: block !important; }
            /* Sembunyikan semua UI utama */
            body > *:not(#receipt-print-container) { display: none !important; }
            
            /* Tampilkan Container Print */
            #receipt-print-container {
                display: block !important;
                position: absolute !important;
                left: 0 !important;
                top: 0 !important;
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            #receipt-print-area {
                display: block !important;
                width: 100% !important;
                max-width: 80mm !important; /* Maksimal lebar printer thermal */
                margin: 0 auto !important;
                padding: 10px !important;
                box-sizing: border-box !important;
                font-family: 'Courier New', Courier, monospace !important;
                color: #000 !important;
                font-size: 12px !important;
            }
        }
    </style>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--color-primary)', 
                        darkBg: '#0B1120',
                        darkSurface: '#182235'
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'float': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)'
                    }
                }
            }
        }
    </script>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-darkBg dark:text-slate-200 font-sans h-screen w-screen flex overflow-hidden selection:bg-primary selection:text-white">

    <!-- 1. NOTIFIKASI TOAST -->
    <div id="toast-container" class="fixed top-4 right-4 z-[70] flex flex-col gap-2 pointer-events-none"></div>

    <!-- 2. SIDEBAR DESKTOP -->
    <aside class="hidden md:flex flex-col w-72 bg-white dark:bg-darkSurface border-r border-slate-200 dark:border-slate-800 z-20 shadow-soft">
        <div class="p-6 flex items-center gap-3">
            <div id="app-logo-desktop" class="w-10 h-10 rounded-xl bg-primary text-white flex items-center justify-center font-bold text-xl overflow-hidden shadow-md">
                <i data-lucide="store"></i>
            </div>
            <h1 id="app-name-desktop" class="font-bold text-2xl tracking-tight text-slate-900 dark:text-white">KasirSync</h1>
        </div>
        <nav class="flex-1 px-4 space-y-2 mt-4" id="desktop-nav">
            <!-- Nav Items di-inject via JS -->
        </nav>
        <div class="p-4 border-t border-slate-100 dark:border-slate-800">
            <button onclick="toggleDarkMode()" class="btn-press w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                <i data-lucide="moon" class="dark:hidden"></i>
                <i data-lucide="sun" class="hidden dark:block"></i>
                <span class="font-medium">Ganti Tema</span>
            </button>
        </div>
    </aside>

    <!-- 3. MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-full relative w-full">
        <!-- Mobile Header -->
        <header class="md:hidden flex items-center justify-between p-4 bg-primary text-white shadow-md z-10 sticky top-0 transition-colors duration-300">
            <div class="flex items-center gap-3">
                <div id="app-logo-mobile" class="w-8 h-8 rounded-lg bg-white/20 text-white flex items-center justify-center overflow-hidden backdrop-blur-sm border border-white/10 shadow-sm">
                    <i data-lucide="store" class="w-5 h-5"></i>
                </div>
                <h1 id="app-name-mobile" class="font-bold text-lg text-white tracking-wide">KasirSync</h1>
            </div>
            <button onclick="toggleDarkMode()" class="p-2 rounded-full bg-white/20 text-white btn-press hover:bg-white/30 backdrop-blur-sm border border-white/10 shadow-sm">
                <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
            </button>
        </header>

        <!-- Dynamic Content Area -->
        <div id="main-view" class="flex-1 overflow-y-auto pb-safe p-4 md:p-8 bg-slate-50/50 dark:bg-darkBg relative">
            <!-- Content di-inject via JS -->
        </div>
    </main>

    <!-- 4. MOBILE BOTTOM NAV -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 glass-nav z-40 pb-[env(safe-area-inset-bottom)] shadow-[0_-10px_20px_-10px_rgba(0,0,0,0.05)]">
        <ul class="flex justify-around items-center p-2" id="mobile-nav">
            <!-- Nav Items di-inject via JS -->
        </ul>
    </nav>

    <!-- MODALS -->
    <!-- Modal Backdrop -->
    <div id="modal-backdrop" class="fixed inset-0 bg-slate-900/40 dark:bg-slate-900/80 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <!-- Modal Content Container -->
        <div id="modal-content" class="bg-white dark:bg-darkSurface w-full max-w-md rounded-2xl shadow-float transform scale-95 opacity-0 transition-all duration-300 max-h-[90vh] overflow-y-auto flex flex-col">
            <!-- Modal Body Injected Here -->
        </div>
    </div>

    <!-- AREA CETAK STRUK KHUSUS -->
    <div id="receipt-print-container" class="hidden">
        <div id="receipt-print-area"></div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // ==========================================
        // 1. CORE SYSTEM & DATABASE (IndexedDB)
        // ==========================================
        const DB_NAME = 'KasirSyncDB';
        const DB_VERSION = 1; 
        let db;

        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = (event) => reject("Database error: " + event.target.errorCode);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('products')) db.createObjectStore('products', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('transactions')) db.createObjectStore('transactions', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'key' });
                };
                request.onsuccess = (event) => {
                    db = event.target.result;
                    resolve(db);
                };
            });
        };

        const dbOp = {
            get: (storeName, key) => new Promise(resolve => {
                const tx = db.transaction(storeName, 'readonly');
                const request = tx.objectStore(storeName).get(key);
                request.onsuccess = () => resolve(request.result);
            }),
            getAll: (storeName) => new Promise(resolve => {
                const tx = db.transaction(storeName, 'readonly');
                const request = tx.objectStore(storeName).getAll();
                request.onsuccess = () => resolve(request.result);
            }),
            put: (storeName, data) => new Promise(resolve => {
                const tx = db.transaction(storeName, 'readwrite');
                tx.objectStore(storeName).put(data);
                tx.oncomplete = () => resolve(true);
            }),
            delete: (storeName, key) => new Promise(resolve => {
                const tx = db.transaction(storeName, 'readwrite');
                tx.objectStore(storeName).delete(key);
                tx.oncomplete = () => resolve(true);
            }),
            clear: (storeName) => new Promise(resolve => {
                const tx = db.transaction(storeName, 'readwrite');
                tx.objectStore(storeName).clear();
                tx.oncomplete = () => resolve(true);
            })
        };

        // ==========================================
        // 2. STATE MANAGEMENT & DUMMY DATA
        // ==========================================
        const state = {
            activeTab: 'pos',
            cart: [],
            products: [],
            settings: {
                appName: 'KasirSync',
                primaryColor: '#2563EB',
                logoBase64: '',
                autoPrint: false
            }
        };

        const NAVIGATION = [
            { id: 'pos', icon: 'calculator', label: 'Kasir' },
            { id: 'products', icon: 'package', label: 'Produk' },
            { id: 'history', icon: 'receipt', label: 'Riwayat Transaksi' },
            { id: 'settings', icon: 'settings', label: 'Pengaturan' }
        ];

        const injectDummyData = async () => {
            const hasData = localStorage.getItem('kasirsync_init');
            if (!hasData) {
                const dummies = [
                    { id: Date.now().toString()+'1', name: 'Kopi Susu Gula Aren', price: 15000, stock: 100, image: '', category: 'Minuman', barcode: '89901' },
                    { id: Date.now().toString()+'2', name: 'Mie Goreng Special', price: 12000, stock: 50, image: '', category: 'Makanan', barcode: '89902' },
                    { id: Date.now().toString()+'3', name: 'Keripik Kentang Original', price: 8500, stock: 30, image: '', category: 'Snack', barcode: '89903' },
                    { id: Date.now().toString()+'4', name: 'Air Mineral 600ml', price: 4000, stock: 125, image: '', category: 'Minuman', barcode: '89904' }
                ];
                for (let d of dummies) await dbOp.put('products', d);
                
                await dbOp.put('settings', { key: 'appName', value: 'KasirSync' });
                await dbOp.put('settings', { key: 'primaryColor', value: '#2563EB' });
                await dbOp.put('settings', { key: 'autoPrint', value: false });
                
                localStorage.setItem('kasirsync_init', 'true');
            }
        };

        const loadSettings = async () => {
            const settings = await dbOp.getAll('settings');
            settings.forEach(s => state.settings[s.key] = s.value);
            applyBranding();
        };

        const applyBranding = () => {
            document.documentElement.style.setProperty('--color-primary', state.settings.primaryColor);
            document.title = `${state.settings.appName} - Offline POS`;
            
            // Update Meta Theme Color agar Status Bar HP berubah mengikuti pengaturan warna
            const metaTheme = document.getElementById('meta-theme-color');
            if (metaTheme) {
                metaTheme.setAttribute('content', state.settings.primaryColor);
            }

            // Ubah teks nama di header desktop & mobile
            ['app-name-desktop', 'app-name-mobile'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.innerText = state.settings.appName;
            });

            // Pasang logo gambar jika tersedia
            if (state.settings.logoBase64) {
                const imgTag = `<img src="${state.settings.logoBase64}" class="w-full h-full object-cover">`;
                document.getElementById('app-logo-desktop').innerHTML = imgTag;
                document.getElementById('app-logo-mobile').innerHTML = imgTag;
                
                // Ubah Favicon (Icon Tab Browser) secara dinamis
                let link = document.querySelector("link[rel~='icon']");
                if (!link) {
                    link = document.createElement('link');
                    link.rel = 'icon';
                    document.head.appendChild(link);
                }
                link.href = state.settings.logoBase64;
            }
        };

        // ==========================================
        // 3. UTILITIES & UI HELPERS
        // ==========================================
        const formatRp = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
        const generateId = () => Date.now().toString() + Math.random().toString(36).substring(2, 5);
        const fileToBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        const showToast = (message, type = 'info') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = { success: 'bg-emerald-500', error: 'bg-red-500', info: 'bg-primary' };
            toast.className = `${colors[type]} text-white px-4 py-3 rounded-xl shadow-float flex items-center gap-3 animate-fade-up pointer-events-auto`;
            toast.innerHTML = `
                <i data-lucide="${type === 'success' ? 'check-circle' : type === 'error' ? 'alert-circle' : 'info'}" class="w-5 h-5"></i>
                <span class="font-medium text-sm">${message}</span>
            `;
            container.appendChild(toast);
            lucide.createIcons();
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                toast.style.transition = 'all 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        const toggleDarkMode = () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        // MODAL LOGIC (Auto-Close Friendly)
        const openModal = (contentHtml) => {
            const backdrop = document.getElementById('modal-backdrop');
            const content = document.getElementById('modal-content');
            content.innerHTML = contentHtml;
            backdrop.classList.remove('hidden');
            void backdrop.offsetWidth; // force reflow
            backdrop.classList.remove('opacity-0');
            content.classList.remove('scale-95', 'opacity-0');
            lucide.createIcons();
        };

        const closeModal = () => {
            const backdrop = document.getElementById('modal-backdrop');
            const content = document.getElementById('modal-content');
            backdrop.classList.add('opacity-0');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                backdrop.classList.add('hidden');
                content.innerHTML = '';
            }, 300);
        };

        // ==========================================
        // 4. CORE VIEWS & NAVIGATION
        // ==========================================
        const renderNavigation = () => {
            const desktopNav = document.getElementById('desktop-nav');
            const mobileNav = document.getElementById('mobile-nav');
            
            const createNavItem = (item, isMobile) => {
                const isActive = state.activeTab === item.id;
                const activeClass = isActive 
                    ? (isMobile ? 'text-primary' : 'bg-primary text-white shadow-md') 
                    : (isMobile ? 'text-slate-400 dark:text-slate-500' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800');
                
                if (isMobile) {
                    return `
                        <li class="w-full">
                            <button onclick="navigate('${item.id}')" class="btn-press w-full flex flex-col items-center justify-center p-2 gap-1 ${activeClass}">
                                <i data-lucide="${item.icon}" class="w-6 h-6 ${isActive ? 'fill-primary/20' : ''}"></i>
                                <span class="text-[10px] font-medium leading-tight text-center">${item.label}</span>
                            </button>
                        </li>
                    `;
                } else {
                    return `
                        <button onclick="navigate('${item.id}')" class="btn-press w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeClass}">
                            <i data-lucide="${item.icon}" class="${isActive ? '' : ''}"></i>
                            <span class="font-medium">${item.label}</span>
                        </button>
                    `;
                }
            };

            desktopNav.innerHTML = NAVIGATION.map(item => createNavItem(item, false)).join('');
            mobileNav.innerHTML = NAVIGATION.map(item => createNavItem(item, true)).join('');
            lucide.createIcons();
        };

        const navigate = async (tabId) => {
            state.activeTab = tabId;
            renderNavigation();
            const view = document.getElementById('main-view');
            view.innerHTML = '<div class="flex items-center justify-center h-full"><i data-lucide="loader-2" class="w-8 h-8 animate-spin text-primary"></i></div>';
            lucide.createIcons();
            
            await new Promise(r => setTimeout(r, 100)); // micro delay for smooth UI
            
            switch(tabId) {
                case 'pos': await renderPOSView(); break;
                case 'products': await renderProductsView(); break;
                case 'history': await renderHistoryView(); break;
                case 'settings': renderSettingsView(); break;
            }
            lucide.createIcons();
        };

        // ==========================================
        // A. KASIR (POS) VIEW & SWIPE-TO-CLOSE
        // ==========================================
        let cartOpen = false;
        
        window.closeMobileCart = () => {
            const panel = document.getElementById('cart-panel');
            if (panel && cartOpen) {
                cartOpen = false;
                panel.style.transform = ''; 
                panel.classList.add('translate-y-full');
                panel.classList.remove('translate-y-0', 'shadow-[0_-20px_50px_-10px_rgba(0,0,0,0.3)]');
            }
        };

        window.toggleMobileCart = () => {
            const panel = document.getElementById('cart-panel');
            if(!panel) return;
            cartOpen = !cartOpen;
            if(cartOpen) {
                panel.style.transform = ''; 
                panel.classList.remove('translate-y-full');
                panel.classList.add('translate-y-0', 'shadow-[0_-20px_50px_-10px_rgba(0,0,0,0.3)]');
            } else {
                window.closeMobileCart();
            }
        };

        const initSwipeToClose = () => {
            const handle = document.getElementById('cart-drag-handle');
            const panel = document.getElementById('cart-panel');
            if (!handle || !panel) return;

            let startY = 0;
            let currentY = 0;
            let isDragging = false;

            handle.addEventListener('touchstart', (e) => {
                startY = e.touches[0].clientY;
                isDragging = true;
                panel.style.transition = 'none'; // Matikan animasi untuk drag presisi
            }, { passive: true });

            handle.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                currentY = e.touches[0].clientY;
                const diffY = currentY - startY;
                if (diffY > 0) { // Hanya izinkan swipe ke arah bawah
                    panel.style.transform = `translateY(${diffY}px)`;
                }
            }, { passive: true });

            handle.addEventListener('touchend', (e) => {
                if (!isDragging) return;
                isDragging = false;
                panel.style.transition = 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)'; // Nyalakan animasi kembali
                
                const diffY = currentY - startY;
                if (diffY > 80) { // Jika ditarik > 80px ke bawah, tutup penuh
                    window.closeMobileCart();
                } else { // Jika tarikan kurang dari 80px, pantulkan kembali ke atas
                    panel.style.transform = 'translateY(0)';
                }
                setTimeout(() => { startY = 0; currentY = 0; }, 50);
            });

            // Tap klik handle untuk tutup
            handle.addEventListener('click', () => {
                if (startY === 0 && currentY === 0) window.toggleMobileCart();
            });
        };

        const renderPOSView = async () => {
            state.products = await dbOp.getAll('products');
            const view = document.getElementById('main-view');
            
            view.innerHTML = `
                <div class="flex flex-col lg:flex-row gap-6 h-full">
                    <!-- Products Grid -->
                    <div class="flex-1 flex flex-col gap-4 min-h-[50vh]">
                        <div class="relative">
                            <i data-lucide="search" class="absolute left-4 top-3.5 w-5 h-5 text-slate-400"></i>
                            <input type="text" id="pos-search" placeholder="Cari nama atau barcode produk..." class="w-full pl-12 pr-4 py-3 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-darkSurface focus:ring-2 focus:ring-primary outline-none transition-all shadow-sm">
                        </div>
                        <div class="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-4 overflow-y-auto pb-32 lg:pb-0" id="pos-product-list">
                            <!-- Products mapped here -->
                        </div>
                    </div>

                    <!-- Cart Bottom Sheet (Mobile) / Sidebar (Desktop) -->
                    <div class="lg:w-[380px] bg-white dark:bg-darkSurface rounded-2xl shadow-soft flex flex-col border border-slate-100 dark:border-slate-800 
                                fixed lg:relative bottom-[env(safe-area-inset-bottom)] lg:bottom-auto left-0 lg:left-auto right-0 lg:right-auto z-30
                                rounded-t-3xl lg:rounded-2xl transform transition-transform duration-300 translate-y-full lg:translate-y-0 h-[80vh] lg:h-auto" id="cart-panel">
                        
                        <!-- Drag handle mobile (NATIVE SWIPE FEEL) -->
                        <div class="w-full flex justify-center pt-3 pb-2 lg:hidden cursor-grab active:cursor-grabbing" id="cart-drag-handle">
                            <div class="w-12 h-1.5 bg-slate-300 dark:bg-slate-600 rounded-full"></div>
                        </div>
                        
                        <div class="px-5 pb-4 pt-1 lg:pt-5 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center bg-white dark:bg-darkSurface lg:rounded-t-2xl rounded-t-3xl rounded-b-none lg:rounded-b-none shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)] lg:shadow-none">
                            <h2 class="font-bold text-lg">Keranjang <span id="cart-count" class="bg-primary/10 text-primary px-2 py-0.5 rounded-md text-sm ml-2">0</span></h2>
                            <button onclick="clearCart()" class="text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 p-2 rounded-lg btn-press"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                        
                        <div class="flex-1 overflow-y-auto p-2" id="cart-items">
                            <!-- Cart items -->
                        </div>
                        
                        <div class="p-5 bg-slate-50 dark:bg-slate-800/50 rounded-b-2xl border-t border-slate-100 dark:border-slate-800">
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-slate-500 dark:text-slate-400 font-medium">Total Tagihan</span>
                                <span class="text-2xl font-bold text-primary" id="cart-total">Rp 0</span>
                            </div>
                            <button onclick="openCheckoutModal()" class="w-full bg-primary text-white py-4 rounded-xl font-bold text-lg shadow-float btn-press flex items-center justify-center gap-2">
                                <i data-lucide="credit-card"></i> Checkout
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Floating Cart Button (Mobile) -->
                <button onclick="toggleMobileCart()" class="lg:hidden fixed bottom-[calc(80px+env(safe-area-inset-bottom))] right-4 w-14 h-14 bg-primary text-white rounded-full shadow-float flex items-center justify-center z-20 btn-press">
                    <i data-lucide="shopping-cart"></i>
                    <span id="floating-cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-white dark:border-darkBg hidden">0</span>
                </button>
            `;

            document.getElementById('pos-search').addEventListener('input', (e) => updatePOSGrid(e.target.value));
            updatePOSGrid('');
            updateCartUI();
            
            cartOpen = false;
            initSwipeToClose();
        };

        const updatePOSGrid = (searchQuery) => {
            const list = document.getElementById('pos-product-list');
            const q = searchQuery.toLowerCase();
            const filtered = state.products.filter(p => p.name.toLowerCase().includes(q) || (p.barcode && p.barcode.includes(q)));
            
            if (filtered.length === 0) {
                list.innerHTML = `<div class="col-span-full py-10 text-center text-slate-400"><i data-lucide="package-x" class="w-12 h-12 mx-auto mb-3 opacity-50"></i><p>Produk tidak ditemukan</p></div>`;
                lucide.createIcons();
                return;
            }

            list.innerHTML = filtered.map(p => `
                <div onclick="addToCart('${p.id}')" class="bg-white dark:bg-darkSurface p-3 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 cursor-pointer btn-press hover:border-primary/50 group flex flex-col h-full">
                    <div class="h-24 w-full bg-slate-100 dark:bg-slate-800 rounded-xl mb-3 flex items-center justify-center overflow-hidden">
                        ${p.image ? `<img src="${p.image}" class="w-full h-full object-cover">` : `<i data-lucide="image" class="w-8 h-8 text-slate-300"></i>`}
                    </div>
                    <div class="flex-1 flex flex-col">
                        <h3 class="font-semibold text-sm line-clamp-2 leading-tight mb-1 group-hover:text-primary transition-colors">${p.name}</h3>
                        <div class="mt-auto pt-2 flex items-end justify-between">
                            <span class="font-bold text-primary">${formatRp(p.price)}</span>
                            <span class="text-[10px] px-1.5 py-0.5 rounded bg-slate-100 dark:bg-slate-800 text-slate-500">Stok: ${p.stock}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        };

        const addToCart = (productId) => {
            const product = state.products.find(p => p.id === productId);
            if (!product) return;
            if (product.stock <= 0) { showToast('Stok habis!', 'error'); return; }

            const existing = state.cart.find(item => item.id === productId);
            if (existing) {
                if (existing.qty >= product.stock) { showToast('Maksimal stok tercapai', 'error'); return; }
                existing.qty++;
            } else {
                state.cart.push({ ...product, qty: 1 });
            }
            updateCartUI();
        };

        const updateCartQty = (productId, delta) => {
            const item = state.cart.find(i => i.id === productId);
            if (!item) return;
            const product = state.products.find(p => p.id === productId);
            
            item.qty += delta;
            if (item.qty <= 0) {
                state.cart = state.cart.filter(i => i.id !== productId);
            } else if (item.qty > product.stock) {
                item.qty = product.stock;
                showToast('Maksimal stok tercapai', 'error');
            }
            updateCartUI();
        };

        const clearCart = () => { state.cart = []; updateCartUI(); };

        const updateCartUI = () => {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const countEl = document.getElementById('cart-count');
            const floatCount = document.getElementById('floating-cart-count');
            
            if(!container) return;

            let total = 0;
            let qty = 0;

            if (state.cart.length === 0) {
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-slate-400 opacity-50 py-10">
                        <i data-lucide="shopping-bag" class="w-16 h-16 mb-4"></i>
                        <p>Keranjang masih kosong</p>
                    </div>`;
            } else {
                container.innerHTML = state.cart.map(item => {
                    const subtotal = item.price * item.qty;
                    total += subtotal;
                    qty += item.qty;
                    return `
                        <div class="flex items-center gap-3 p-3 bg-white dark:bg-darkSurface border-b border-slate-50 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/50 rounded-xl animate-fade-up">
                            <div class="flex-1">
                                <h4 class="font-semibold text-sm line-clamp-1">${item.name}</h4>
                                <div class="text-primary font-medium text-sm">${formatRp(item.price)}</div>
                            </div>
                            <div class="flex items-center bg-slate-100 dark:bg-slate-800 rounded-lg p-1 border border-slate-200 dark:border-slate-700">
                                <button onclick="updateCartQty('${item.id}', -1)" class="w-7 h-7 flex items-center justify-center rounded-md bg-white dark:bg-slate-700 shadow-sm text-slate-600 dark:text-slate-300 btn-press"><i data-lucide="minus" class="w-4 h-4"></i></button>
                                <span class="w-8 text-center font-bold text-sm">${item.qty}</span>
                                <button onclick="updateCartQty('${item.id}', 1)" class="w-7 h-7 flex items-center justify-center rounded-md bg-white dark:bg-slate-700 shadow-sm text-slate-600 dark:text-slate-300 btn-press"><i data-lucide="plus" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            totalEl.innerText = formatRp(total);
            countEl.innerText = qty;
            if(floatCount) {
                if(qty > 0) { floatCount.classList.remove('hidden'); floatCount.innerText = qty; }
                else floatCount.classList.add('hidden');
            }
            lucide.createIcons();
        };

        const openCheckoutModal = () => {
            if (state.cart.length === 0) { showToast('Keranjang kosong!', 'error'); return; }
            
            const total = state.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            
            openModal(`
                <div class="p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold">Pembayaran</h2>
                        <button onclick="closeModal()" class="p-2 bg-slate-100 dark:bg-slate-800 rounded-full btn-press"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    
                    <div class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl mb-6 text-center border border-slate-100 dark:border-slate-700">
                        <div class="text-slate-500 mb-1 text-sm">Total Tagihan</div>
                        <div class="text-3xl font-bold text-primary" data-total="${total}" id="checkout-total">${formatRp(total)}</div>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-2 text-slate-600 dark:text-slate-300">Jumlah Uang Diterima</label>
                            <div class="relative">
                                <span class="absolute left-4 top-3.5 font-bold text-slate-400">Rp</span>
                                <input type="number" id="pay-amount" class="w-full pl-12 pr-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-darkSurface focus:ring-2 focus:ring-primary outline-none text-lg font-bold" placeholder="0" oninput="calculateChange()">
                            </div>
                        </div>
                        <div class="flex gap-2">
                            ${[50000, 100000, 200000].map(val => `<button type="button" onclick="document.getElementById('pay-amount').value='${val}'; calculateChange()" class="flex-1 py-2 bg-slate-100 dark:bg-slate-800 rounded-lg text-sm font-medium btn-press hover:bg-primary hover:text-white transition-colors border border-slate-200 dark:border-slate-700">${val/1000}k</button>`).join('')}
                            <button type="button" onclick="document.getElementById('pay-amount').value='${total}'; calculateChange()" class="flex-1 py-2 bg-primary/10 text-primary rounded-lg text-sm font-medium btn-press border border-primary/20">Pas</button>
                        </div>
                        
                        <div class="flex justify-between items-center p-4 bg-orange-50 dark:bg-orange-900/20 text-orange-600 dark:text-orange-400 rounded-xl mt-4 border border-orange-100 dark:border-orange-800/50">
                            <span class="font-medium">Kembalian</span>
                            <span class="text-xl font-bold" id="checkout-change">Rp 0</span>
                        </div>
                    </div>

                    <button onclick="processCheckout()" class="w-full bg-primary text-white py-4 rounded-xl font-bold text-lg shadow-float btn-press mt-6 flex items-center justify-center gap-2">
                        <i data-lucide="check-circle"></i> Selesaikan Transaksi
                    </button>
                </div>
            `);
            setTimeout(() => document.getElementById('pay-amount').focus(), 300);
        };

        window.calculateChange = () => {
            const total = parseInt(document.getElementById('checkout-total').dataset.total);
            const pay = parseInt(document.getElementById('pay-amount').value) || 0;
            const change = pay - total;
            const el = document.getElementById('checkout-change');
            if (change < 0) {
                el.innerText = "Kurang " + formatRp(Math.abs(change));
                el.classList.replace('text-orange-600', 'text-red-500');
            } else {
                el.innerText = formatRp(change);
                el.classList.replace('text-red-500', 'text-orange-600');
            }
        };

        const processCheckout = async () => {
            const total = parseInt(document.getElementById('checkout-total').dataset.total);
            const pay = parseInt(document.getElementById('pay-amount').value) || 0;
            
            if (pay < total) { showToast('Uang tidak cukup!', 'error'); return; }

            const trx = {
                id: 'TRX-' + generateId().toUpperCase(),
                date: new Date().toISOString(),
                total: total,
                pay: pay,
                change: pay - total,
                items: state.cart.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qty }))
            };

            await dbOp.put('transactions', trx);

            for (let item of state.cart) {
                const product = state.products.find(p => p.id === item.id);
                if(product) {
                    product.stock -= item.qty;
                    await dbOp.put('products', product);
                }
            }

            // AUTO-CLOSE UX: Tutup panel keranjang (mobile) tanpa menghapus backdrop Modal
            window.closeMobileCart(); 
            clearCart();
            
            showToast('Transaksi Sukses!', 'success');
            
            // Selalu tampilkan preview struk dan info kembalian
            showReceiptModal(trx);

            // Cek fitur cetak struk otomatis
            if(state.settings.autoPrint) {
                // Beri waktu sekejap agar HTML struk selesai ter-generate di DOM
                setTimeout(() => {
                    printReceipt(trx.id);
                }, 150); 
            }
        };

        // --- PREVIEW, PRINT & SHARE LOGIC ---
        
        const showReceiptModal = async (trx) => {
            // Tampilkan loading spinner jika modal sedang dipanggil dari menu Riwayat (posisi tertutup)
            const content = document.getElementById('modal-content');
            if (content.innerHTML === '') {
                openModal(`<div class="p-10 flex justify-center items-center"><i data-lucide="loader-2" class="w-8 h-8 animate-spin text-primary"></i></div>`);
            }
            
            // Ambil format HTML murni untuk Struk
            const receiptHtml = await generateReceiptHTML(trx.id);

            // Render Preview Layout di dalam Modal
            const modalHtml = `
                <div class="p-4 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center sticky top-0 bg-white dark:bg-darkSurface z-20">
                    <h2 class="text-lg font-bold">Preview Struk</h2>
                    <button onclick="closeModal()" class="p-2 bg-slate-100 dark:bg-slate-800 rounded-full btn-press"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                
                <div class="p-6 bg-slate-50 dark:bg-slate-900/50 min-h-[300px] flex flex-col items-center">
                    <div class="bg-emerald-100 text-emerald-600 px-5 py-2.5 rounded-full font-bold text-sm mb-6 flex items-center gap-2 shadow-sm border border-emerald-200">
                        <i data-lucide="check-circle" class="w-5 h-5"></i> Kembalian: ${formatRp(trx.change)}
                    </div>
                    
                    <!-- Kertas Struk Nyata (Preview) -->
                    <div class="bg-white shadow-[0_10px_25px_-5px_rgba(0,0,0,0.1)] w-full max-w-[320px] mx-auto border border-slate-200 relative" style="border-top: 3px dashed #cbd5e1; border-bottom: 3px dashed #cbd5e1;">
                        ${receiptHtml}
                    </div>
                </div>
                
                <div class="p-4 border-t border-slate-100 dark:border-slate-800 sticky bottom-0 bg-white dark:bg-darkSurface flex gap-3 z-20">
                    <button onclick="printReceipt('${trx.id}')" class="flex-1 py-3.5 bg-primary text-white rounded-xl font-bold btn-press shadow-float flex items-center justify-center gap-2">
                        <i data-lucide="printer" class="w-5 h-5"></i> Cetak Struk
                    </button>
                    <button onclick="shareReceipt('${trx.id}')" class="flex-1 py-3.5 bg-primary/10 text-primary border border-primary/20 rounded-xl font-bold btn-press flex items-center justify-center gap-2">
                        <i data-lucide="share-2" class="w-5 h-5"></i> Bagikan
                    </button>
                </div>
            `;
            
            openModal(modalHtml);
        };

        const generateReceiptHTML = async (trxId) => {
            const trx = await dbOp.get('transactions', trxId);
            if(!trx) return '';
            
            // Tambahkan logo jika pengguna sudah upload logo di pengaturan
            const logoHtml = state.settings.logoBase64 
                ? `<img src="${state.settings.logoBase64}" style="max-width: 50px; max-height: 50px; object-fit: contain; margin-bottom: 5px; filter: grayscale(100%);">` 
                : '';

            // Format HTML ini dirancang agar sempurna saat dicetak (Printer Kasir) maupun di-preview
            return `
                <div style="font-family: 'Courier New', Courier, monospace; font-size: 13px; color: #000; line-height: 1.4; padding: 15px; width: 100%; box-sizing: border-box; background: #fff;">
                    <div style="text-align: center; margin-bottom: 15px;">
                        ${logoHtml}
                        <h2 style="margin: 0; font-size: 20px; font-weight: bold; text-transform: uppercase;">${state.settings.appName}</h2>
                        <div style="font-size: 11px; margin-top: 4px;">Sistem POS Offline</div>
                    </div>
                    
                    <div style="border-bottom: 1px dashed #000; margin-bottom: 10px;"></div>
                    
                    <div style="margin-bottom: 10px; font-size: 11px;">
                        <div style="display: flex; justify-content: space-between;"><span>No:</span> <span>${trx.id}</span></div>
                        <div style="display: flex; justify-content: space-between;"><span>Tgl:</span> <span>${new Date(trx.date).toLocaleString('id-ID')}</span></div>
                    </div>
                    
                    <div style="border-bottom: 1px dashed #000; margin-bottom: 10px;"></div>
                    
                    <table style="width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 10px;">
                        ${trx.items.map(item => `
                            <tr>
                                <td colspan="3" style="padding-bottom: 2px;">${item.name}</td>
                            </tr>
                            <tr>
                                <td style="width: 20%;">${item.qty}x</td>
                                <td style="width: 40%;">${item.price.toLocaleString('id-ID')}</td>
                                <td style="width: 40%; text-align: right;">${(item.qty * item.price).toLocaleString('id-ID')}</td>
                            </tr>
                        `).join('')}
                    </table>
                    
                    <div style="border-bottom: 1px dashed #000; margin-bottom: 10px;"></div>
                    
                    <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; margin-bottom: 4px;">
                        <span>TOTAL</span>
                        <span>Rp ${trx.total.toLocaleString('id-ID')}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 12px;">
                        <span>Tunai</span>
                        <span>Rp ${trx.pay.toLocaleString('id-ID')}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 12px;">
                        <span>Kembali</span>
                        <span>Rp ${trx.change.toLocaleString('id-ID')}</span>
                    </div>
                    
                    <div style="border-bottom: 1px dashed #000; margin-top: 15px; margin-bottom: 10px;"></div>
                    
                    <div style="text-align: center; font-size: 11px;">
                        Terima Kasih<br>Silakan Datang Kembali<br>
                        <span style="font-size: 9px; opacity: 0.7; display: block; margin-top: 5px;">Powered by Bejaja Digital 2026</span>
                    </div>
                </div>
            `;
        };

        const printReceipt = async (trxId) => {
            const container = document.getElementById('receipt-print-container');
            const area = document.getElementById('receipt-print-area');
            
            area.innerHTML = await generateReceiptHTML(trxId);
            
            // Render the print window layout natively overriding body via CSS @media print
            // Kita percepat timeout agar browser mengizinkan pop-up / print dialog 
            setTimeout(() => {
                window.print();
            }, 50);
        };

        const shareReceipt = async (trxId) => {
            const container = document.getElementById('receipt-print-container');
            const area = document.getElementById('receipt-print-area');
            
            area.innerHTML = await generateReceiptHTML(trxId);
            
            // Tampilkan sementara di luar viewport untuk di-capture html2canvas
            container.classList.remove('hidden');
            // Pastikan lebar dibatasi agar hasil gambar mirip struk 80mm (skala printer)
            area.style.width = "300px"; 
            
            try {
                const canvas = await html2canvas(area, { scale: 2, backgroundColor: "#ffffff" });
                container.classList.add('hidden');
                area.style.width = ""; // reset styling width
                
                canvas.toBlob(async (blob) => {
                    const file = new File([blob], `struk-${trxId}.png`, { type: "image/png" });
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            files: [file],
                            title: 'Struk Belanja KasirSync',
                            text: `Berikut struk digital untuk transaksi ${trxId}`
                        });
                    } else {
                        // Fallback jika tidak dukung native share
                        const link = document.createElement('a');
                        link.download = `struk-${trxId}.png`;
                        link.href = canvas.toDataURL();
                        link.click();
                        showToast('Struk diunduh (Bagikan Native tidak didukung HP ini)', 'info');
                    }
                });
            } catch (e) {
                container.classList.add('hidden');
                showToast('Gagal memproses gambar', 'error');
            }
        };

        // B. PRODUK VIEW
        const renderProductsView = async () => {
            state.products = await dbOp.getAll('products');
            const view = document.getElementById('main-view');
            
            view.innerHTML = `
                <div class="max-w-6xl mx-auto flex flex-col h-full gap-4">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white dark:bg-darkSurface p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800">
                        <div>
                            <h2 class="text-2xl font-bold">Kelola Produk</h2>
                            <p class="text-slate-500 text-sm">Total ${state.products.length} produk terdaftar.</p>
                        </div>
                        <button onclick="openProductModal()" class="w-full sm:w-auto bg-primary text-white px-5 py-2.5 rounded-xl font-semibold shadow-float btn-press flex items-center justify-center gap-2">
                            <i data-lucide="plus"></i> Tambah Produk
                        </button>
                    </div>

                    <div class="bg-white dark:bg-darkSurface rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 overflow-hidden flex-1 flex flex-col">
                        <div class="p-4 border-b border-slate-100 dark:border-slate-800 relative">
                            <i data-lucide="search" class="absolute left-7 top-7 w-5 h-5 text-slate-400"></i>
                            <input type="text" id="prod-search" placeholder="Cari nama, kategori..." class="w-full pl-10 pr-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary transition-all">
                        </div>
                        <div class="flex-1 overflow-auto pb-safe">
                            <table class="w-full text-left border-collapse min-w-[500px]">
                                <thead class="bg-slate-50 dark:bg-slate-800/50 sticky top-0 z-10 text-xs uppercase text-slate-500 font-semibold">
                                    <tr>
                                        <th class="p-4 w-16 text-center">Img</th>
                                        <th class="p-4">Info Produk</th>
                                        <th class="p-4">Harga</th>
                                        <th class="p-4 text-center">Stok</th>
                                        <th class="p-4 text-right">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody id="product-table-body" class="text-sm divide-y divide-slate-100 dark:divide-slate-800">
                                    <!-- Rows mapped here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('prod-search').addEventListener('input', (e) => updateProductTable(e.target.value));
            updateProductTable('');
        };

        const updateProductTable = (searchQuery) => {
            const tbody = document.getElementById('product-table-body');
            const q = searchQuery.toLowerCase();
            const filtered = state.products.filter(p => p.name.toLowerCase().includes(q) || (p.category && p.category.toLowerCase().includes(q)));

            if(filtered.length === 0){
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-slate-400">Tidak ada data produk.</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(p => `
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                    <td class="p-4">
                        <div class="w-10 h-10 rounded-lg bg-slate-100 dark:bg-slate-700 flex items-center justify-center overflow-hidden border border-slate-200 dark:border-slate-600">
                            ${p.image ? `<img src="${p.image}" class="w-full h-full object-cover">` : `<i data-lucide="image" class="w-5 h-5 text-slate-400"></i>`}
                        </div>
                    </td>
                    <td class="p-4">
                        <div class="font-bold text-slate-800 dark:text-slate-200">${p.name}</div>
                        <div class="text-xs text-slate-500 mt-0.5">${p.category || '-'}</div>
                    </td>
                    <td class="p-4 font-semibold text-primary">${formatRp(p.price)}</td>
                    <td class="p-4 text-center">
                        <span class="px-2.5 py-1 rounded-full text-xs font-bold ${p.stock <= 5 ? 'bg-red-100 text-red-600 dark:bg-red-900/30' : 'bg-emerald-100 text-emerald-600 dark:bg-emerald-900/30'}">${p.stock}</span>
                    </td>
                    <td class="p-4 text-right">
                        <div class="flex items-center justify-end gap-2">
                            <button onclick="openProductModal('${p.id}')" class="p-2 text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-500/10 rounded-lg btn-press"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                            <button onclick="deleteProduct('${p.id}')" class="p-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 rounded-lg btn-press"><i data-lucide="trash" class="w-4 h-4"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        };

        window.openProductModal = async (id = null) => {
            let p = { id: '', name: '', price: '', stock: '', category: '', image: '', barcode: '' };
            if (id) {
                p = state.products.find(x => x.id === id) || p;
            }

            openModal(`
                <div class="p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold">${id ? 'Edit' : 'Tambah'} Produk</h2>
                        <button onclick="closeModal()" class="p-2 bg-slate-100 dark:bg-slate-800 rounded-full btn-press"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    <form id="product-form" onsubmit="saveProduct(event, '${id || ''}')" class="space-y-4">
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">Nama Produk *</label>
                            <input type="text" id="p-name" value="${p.name}" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-medium text-slate-500 mb-1">Harga (Rp) *</label>
                                <input type="number" id="p-price" value="${p.price}" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500 mb-1">Stok *</label>
                                <input type="number" id="p-stock" value="${p.stock}" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary outline-none">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-medium text-slate-500 mb-1">Kategori</label>
                                <input type="text" id="p-category" value="${p.category}" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500 mb-1">Barcode</label>
                                <input type="text" id="p-barcode" value="${p.barcode || ''}" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary outline-none">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 mb-1">Gambar (Pilih File / Masukkan URL)</label>
                            <div class="flex gap-2 mb-2">
                                <input type="url" id="p-image-url" value="${p.image && p.image.startsWith('http') ? p.image : ''}" placeholder="URL Gambar HTTPS..." class="flex-1 px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary outline-none text-sm">
                                <label class="bg-slate-200 dark:bg-slate-700 px-4 py-2.5 rounded-xl cursor-pointer flex items-center justify-center hover:bg-slate-300 dark:hover:bg-slate-600 transition border border-slate-300 dark:border-slate-600">
                                    <i data-lucide="upload" class="w-4 h-4"></i>
                                    <input type="file" id="p-image-file" accept="image/*" class="hidden" onchange="handleProductImageUpload(event)">
                                </label>
                            </div>
                            <input type="hidden" id="p-image-base64" value="${p.image && p.image.startsWith('data:') ? p.image : ''}">
                            <div id="p-image-preview" class="h-20 w-20 rounded-lg bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 overflow-hidden mt-2 ${p.image ? '' : 'hidden'}">
                                <img src="${p.image}" class="w-full h-full object-cover">
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-primary text-white py-3.5 rounded-xl font-bold shadow-float btn-press mt-4">Simpan Produk</button>
                    </form>
                </div>
            `);
        };

        window.handleProductImageUpload = async (e) => {
            const file = e.target.files[0];
            if(file){
                const b64 = await fileToBase64(file);
                document.getElementById('p-image-base64').value = b64;
                document.getElementById('p-image-url').value = ''; 
                const preview = document.getElementById('p-image-preview');
                preview.innerHTML = `<img src="${b64}" class="w-full h-full object-cover">`;
                preview.classList.remove('hidden');
            }
        };

        window.saveProduct = async (e, id) => {
            e.preventDefault();
            const b64 = document.getElementById('p-image-base64').value;
            const url = document.getElementById('p-image-url').value;
            const finalImage = url ? url : b64;

            const product = {
                id: id || generateId(),
                name: document.getElementById('p-name').value,
                price: parseInt(document.getElementById('p-price').value),
                stock: parseInt(document.getElementById('p-stock').value),
                category: document.getElementById('p-category').value,
                barcode: document.getElementById('p-barcode').value,
                image: finalImage
            };

            await dbOp.put('products', product);
            closeModal(); // UX Auto close
            showToast('Produk berhasil disimpan!', 'success');
            renderProductsView(); 
        };

        window.deleteProduct = async (id) => {
            if(confirm('Yakin ingin menghapus produk ini?')) {
                await dbOp.delete('products', id);
                showToast('Produk dihapus', 'info');
                renderProductsView();
            }
        };

        // C. RIWAYAT VIEW
        const renderHistoryView = async () => {
            const trxs = await dbOp.getAll('transactions');
            trxs.sort((a,b) => new Date(b.date) - new Date(a.date));
            const view = document.getElementById('main-view');
            
            const totalOmset = trxs.reduce((sum, t) => sum + t.total, 0);

            view.innerHTML = `
                <div class="max-w-4xl mx-auto flex flex-col h-full gap-6">
                    <!-- Dashboard Cards -->
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-gradient-to-br from-primary to-blue-600 p-5 rounded-2xl shadow-float text-white">
                            <div class="opacity-80 text-sm mb-1 font-medium">Total Omset</div>
                            <div class="text-2xl sm:text-3xl font-bold">${formatRp(totalOmset)}</div>
                        </div>
                        <div class="bg-white dark:bg-darkSurface p-5 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800">
                            <div class="text-slate-500 text-sm mb-1 font-medium">Total Transaksi</div>
                            <div class="text-2xl sm:text-3xl font-bold text-slate-800 dark:text-white">${trxs.length}</div>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-darkSurface rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 overflow-hidden flex-1 flex flex-col">
                        <div class="p-5 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center bg-slate-50/50 dark:bg-slate-800/20">
                            <h3 class="font-bold text-lg">Riwayat Transaksi</h3>
                        </div>
                        <div class="flex-1 overflow-auto p-2 pb-safe">
                            ${trxs.length === 0 ? `
                                <div class="flex flex-col items-center justify-center py-20 text-slate-400">
                                    <i data-lucide="receipt" class="w-16 h-16 mb-4 opacity-50"></i>
                                    <p>Belum ada transaksi.</p>
                                </div>
                            ` : `
                                <div class="space-y-3">
                                    ${trxs.map(t => `
                                        <div class="p-4 rounded-xl border border-slate-100 dark:border-slate-800 hover:border-primary/30 bg-white dark:bg-darkSurface transition-all group">
                                            <div class="flex justify-between items-start mb-3">
                                                <div>
                                                    <div class="font-bold text-primary text-sm">${t.id}</div>
                                                    <div class="text-xs text-slate-500">${new Date(t.date).toLocaleString('id-ID')}</div>
                                                </div>
                                                <div class="font-bold text-lg">${formatRp(t.total)}</div>
                                            </div>
                                            <div class="text-sm text-slate-600 dark:text-slate-400 mb-3 line-clamp-1">
                                                ${t.items.map(i => `${i.qty}x ${i.name}`).join(', ')}
                                            </div>
                                            <div class="flex justify-end gap-2 border-t border-slate-50 dark:border-slate-800 pt-3">
                                                <button onclick='showReceiptModal(${JSON.stringify(t).replace(/'/g, "&#39;")})' class="px-3 py-1.5 rounded-lg bg-primary/10 text-primary text-xs font-semibold btn-press flex items-center gap-1 border border-primary/20 hover:bg-primary/20"><i data-lucide="eye" class="w-3 h-3"></i> Lihat Struk</button>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            `}
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        };

        // D. PENGATURAN VIEW
        const renderSettingsView = () => {
            const view = document.getElementById('main-view');
            
            view.innerHTML = `
                <div class="max-w-3xl mx-auto flex flex-col gap-6 pb-safe">
                    <h2 class="text-2xl font-bold mb-2">Pengaturan Sistem</h2>

                    <!-- Branding -->
                    <div class="bg-white dark:bg-darkSurface p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800">
                        <h3 class="font-bold text-lg mb-4 flex items-center gap-2"><i data-lucide="palette" class="text-primary"></i> Personalisasi & Branding</h3>
                        
                        <div class="space-y-5">
                            <div>
                                <label class="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-2">Nama Toko / Aplikasi</label>
                                <input type="text" id="set-appname" value="${state.settings.appName}" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary outline-none font-semibold">
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                                <div>
                                    <label class="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-2">Warna Tema (Primary)</label>
                                    <div class="flex items-center gap-3">
                                        <input type="color" id="set-color" value="${state.settings.primaryColor}" class="w-12 h-12 rounded-lg cursor-pointer border-0 p-0 bg-transparent">
                                        <div class="flex-1 px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 font-mono text-sm uppercase flex items-center justify-between">
                                            <span id="set-color-hex">${state.settings.primaryColor}</span>
                                            <button onclick="document.getElementById('set-color').value='#2563EB'; updateColorPreview()" class="text-xs text-primary font-bold">Default</button>
                                        </div>
                                    </div>
                                </div>
                                
                                <div>
                                    <label class="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-2">Logo Toko (Opsional)</label>
                                    <div class="flex items-center gap-3">
                                        <div class="w-12 h-12 rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex items-center justify-center overflow-hidden" id="set-logo-preview">
                                            ${state.settings.logoBase64 ? `<img src="${state.settings.logoBase64}" class="w-full h-full object-cover">` : `<i data-lucide="image" class="w-5 h-5 text-slate-400"></i>`}
                                        </div>
                                        <label class="flex-1 px-4 py-3 rounded-xl bg-primary/10 text-primary font-semibold text-center cursor-pointer hover:bg-primary/20 transition-colors border border-primary/20">
                                            Upload Logo
                                            <input type="file" accept="image/*" class="hidden" onchange="handleLogoUpload(event)">
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <!-- Auto Print Toggle -->
                            <div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 mt-2">
                                <div>
                                    <h4 class="font-semibold text-sm">Cetak Struk Otomatis</h4>
                                    <p class="text-xs text-slate-500">Otomatis print resi saat bayar sukses</p>
                                </div>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" id="set-autoprint" class="sr-only peer" ${state.settings.autoPrint ? 'checked' : ''}>
                                    <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-slate-600 peer-checked:bg-primary"></div>
                                </label>
                            </div>
                            
                            <button onclick="saveSettings()" class="w-full bg-primary text-white py-3.5 rounded-xl font-bold shadow-float btn-press mt-2">Simpan Perubahan</button>
                        </div>
                    </div>

                    <!-- Data Management -->
                    <div class="bg-white dark:bg-darkSurface p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800">
                        <h3 class="font-bold text-lg mb-4 flex items-center gap-2"><i data-lucide="database" class="text-primary"></i> Manajemen Data (Excel)</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="border border-slate-100 dark:border-slate-800 rounded-xl p-4 bg-slate-50/50 dark:bg-slate-800/20">
                                <h4 class="font-semibold mb-2 text-sm">Backup Data</h4>
                                <p class="text-xs text-slate-500 mb-4">Unduh semua data produk dan transaksi ke format .xlsx.</p>
                                <button onclick="exportData()" class="w-full py-2.5 bg-primary text-white rounded-lg font-semibold shadow-sm btn-press flex items-center justify-center gap-2 border border-primary">
                                    <i data-lucide="download" class="w-4 h-4"></i> Export Excel
                                </button>
                            </div>
                            <div class="border border-slate-100 dark:border-slate-800 rounded-xl p-4 bg-slate-50/50 dark:bg-slate-800/20">
                                <h4 class="font-semibold mb-2 text-sm">Restore Produk</h4>
                                <p class="text-xs text-slate-500 mb-4">Unggah file .xlsx untuk menambahkan produk masal.</p>
                                <label class="w-full py-2.5 bg-primary/10 text-primary border border-primary/20 rounded-lg font-semibold shadow-sm cursor-pointer hover:bg-primary/20 transition flex items-center justify-center gap-2">
                                    <i data-lucide="upload" class="w-4 h-4"></i> Import Excel
                                    <input type="file" accept=".xlsx, .xls" class="hidden" onchange="importData(event)">
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Danger Zone -->
                    <div class="bg-primary/5 dark:bg-primary/10 p-6 rounded-2xl border border-primary/20 dark:border-primary/30">
                        <h3 class="font-bold text-lg text-primary mb-2 flex items-center gap-2"><i data-lucide="alert-triangle"></i> Reset Sistem</h3>
                        <p class="text-sm text-slate-600 dark:text-slate-400 mb-4">Tindakan ini akan menghapus seluruh data produk dan transaksi. Pastikan Anda telah mem-backup data terlebih dahulu.</p>
                        <button onclick="resetApp()" class="w-full py-3 bg-primary text-white rounded-xl font-bold shadow-float btn-press">Hapus & Reset Aplikasi</button>
                    </div>
                </div>
            `;
            
            // Color picker real-time update logic
            const colorInput = document.getElementById('set-color');
            window.updateColorPreview = () => {
                document.getElementById('set-color-hex').innerText = colorInput.value.toUpperCase();
                document.documentElement.style.setProperty('--color-primary', colorInput.value);
                
                // Real-time update meta theme color saat user memilih warna
                const metaTheme = document.getElementById('meta-theme-color');
                if (metaTheme) {
                    metaTheme.setAttribute('content', colorInput.value);
                }
            };
            colorInput.addEventListener('input', window.updateColorPreview);
            
            lucide.createIcons();
        };

        window.handleLogoUpload = async (e) => {
            const file = e.target.files[0];
            if(file){
                const b64 = await fileToBase64(file);
                state.settings.logoBase64 = b64;
                document.getElementById('set-logo-preview').innerHTML = `<img src="${b64}" class="w-full h-full object-cover">`;
            }
        };

        window.saveSettings = async () => {
            const name = document.getElementById('set-appname').value;
            const color = document.getElementById('set-color').value;
            const autoPrint = document.getElementById('set-autoprint').checked;
            
            state.settings.appName = name;
            state.settings.primaryColor = color;
            state.settings.autoPrint = autoPrint;

            await dbOp.put('settings', { key: 'appName', value: name });
            await dbOp.put('settings', { key: 'primaryColor', value: color });
            await dbOp.put('settings', { key: 'logoBase64', value: state.settings.logoBase64 });
            await dbOp.put('settings', { key: 'autoPrint', value: autoPrint });
            
            applyBranding();
            showToast('Pengaturan disimpan!', 'success');
        };

        window.exportData = async () => {
            try {
                const products = await dbOp.getAll('products');
                const transactions = await dbOp.getAll('transactions');
                
                const wb = XLSX.utils.book_new();
                
                // Format transaction for export
                const flatTrx = transactions.map(t => ({
                    ID: t.id, Tanggal: new Date(t.date).toLocaleString(), Total: t.total, Tunai: t.pay, Kembali: t.change,
                    Item: t.items.map(i => `${i.qty}x ${i.name}`).join(' | ')
                }));

                const wsProds = XLSX.utils.json_to_sheet(products);
                const wsTrxs = XLSX.utils.json_to_sheet(flatTrx);

                XLSX.utils.book_append_sheet(wb, wsProds, "Produk");
                XLSX.utils.book_append_sheet(wb, wsTrxs, "Transaksi");

                XLSX.writeFile(wb, `Backup_${state.settings.appName}_${new Date().toISOString().split('T')[0]}.xlsx`);
                showToast('Data berhasil diexport', 'success');
            } catch (e) { showToast('Gagal export data', 'error'); }
        };

        window.importData = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            const reader = new FileReader();
            reader.onload = async (evt) => {
                try {
                    const data = evt.target.result;
                    const wb = XLSX.read(data, { type: 'binary' });
                    const sheetName = wb.SheetNames[0];
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[sheetName]);
                    
                    let count = 0;
                    for(let row of json) {
                        if(row.name && row.price) {
                            const prod = {
                                id: row.id ? row.id.toString() : generateId(),
                                name: row.name,
                                price: parseInt(row.price) || 0,
                                stock: parseInt(row.stock) || 0,
                                category: row.category || '',
                                barcode: row.barcode ? row.barcode.toString() : '',
                                image: row.image || ''
                            };
                            await dbOp.put('products', prod);
                            count++;
                        }
                    }
                    showToast(`${count} Produk berhasil diimport!`, 'success');
                } catch(err) {
                    showToast('Format file tidak valid', 'error');
                }
            };
            reader.readAsBinaryString(file);
        };

        window.resetApp = async () => {
            if(confirm('PERINGATAN! Semua data akan hilang permanen. Lanjutkan?')) {
                if(confirm('Ketik OK jika Anda benar-benar yakin.')) {
                    await dbOp.clear('products');
                    await dbOp.clear('transactions');
                    localStorage.removeItem('kasirsync_init');
                    showToast('Aplikasi direset', 'success');
                    setTimeout(() => window.location.reload(), 1000);
                }
            }
        };

        // ==========================================
        // 5. INITIALIZATION
        // ==========================================
        const initApp = async () => {
            try {
                if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.classList.add('dark');
                }
                
                await initDB();
                await loadSettings();
                await injectDummyData();
                navigate('pos');
                
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('sw.js')
                        .then(reg => console.log('SW terdaftar', reg))
                        .catch(err => console.log('SW Gagal', err));
                }
            } catch (err) {
                console.error("Init Error:", err);
                document.body.innerHTML = `<div class="p-10 text-center text-red-500"><h1>Gagal memuat aplikasi.</h1><p>${err}</p></div>`;
            }
        };

        window.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
